services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5226:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=shapes;Username=postgres;Password=postgres"
    volumes:
      - .:/src
      - dev_nuget:/root/.nuget/packages
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shapes
    volumes:
      - dev_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shapes"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dev_pg_data:
  dev_nuget:
